[package]
name = "kley"
version = "0.1.0"
edition = "2024"
authors = ["sumbad"]
description = "Fast and reliable local package manager for npm (JS/TS)"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.5.60", features = ["derive"] }
colored = "3.1.1"
fs_extra = "1.3.0"
home = "0.5.12"
ignore = "0.4.25"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
walkdir = "2.5.0"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
